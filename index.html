<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BCMNeuro — Neural Intelligence Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:system-ui,Segoe UI,Arial;
  background:#020617;
  color:#e5e7eb;
}

header{
  padding:20px;
  text-align:center;
  background:linear-gradient(90deg,#0f172a,#020617);
  font-size:28px;
  font-weight:700;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f172a;
  border-radius:14px;
  padding:18px;
  margin-bottom:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

button{
  background:#2563eb;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{background:#1d4ed8}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.metric{
  font-size:26px;
  font-weight:700;
}

canvas{
  background:#020617;
  border-radius:12px;
  width:100%;
}

footer{
  text-align:center;
  padding:15px;
  opacity:.6;
}
</style>
</head>

<body>

<header>🧠 BCMNeuro — Continuous Brain Intelligence</header>

<div class="container">

<div class="card">
<h2>Upload EEG Data</h2>
<input type="file" id="fileInput">
<br><br>
<button onclick="runAnalysis()">Analyze Neural Activity</button>
<p id="status"></p>
</div>

<div class="grid">

<div class="card">
<h2>Neural Metrics</h2>

<p>Connectivity: <span id="connectivity" class="metric">—</span></p>
<p>Plasticity: <span id="plasticity" class="metric">—</span></p>
<p>Risk Level: <span id="risk" class="metric">—</span></p>

</div>

<div class="card">
<h2>Frequency Bands</h2>
<div id="bands"></div>
</div>

</div>

<div class="card">
<h2>Connectivity Network</h2>
<canvas id="network" height="420"></canvas>
</div>

<div class="card">
<h2>AI Clinical Interpretation</h2>
<div id="aiReport"></div>
</div>

</div>

<footer>BCMNeuro Neural Intelligence Platform</footer>

<script>

function parseCSV(text){
  const rows = text.trim().split("\n");

  // Remove header if first row contains letters
  if(/[a-zA-Z]/.test(rows[0])) rows.shift();

  return rows
    .map(r => r.split(",").map(v => parseFloat(v)))
    .filter(row => row.every(v => !isNaN(v)));
}

function normalize(signal){
  const mean = signal.reduce((a,b)=>a+b,0)/signal.length;
  const centered = signal.map(v => v-mean);
  const variance = centered.reduce((a,b)=>a+b*b,0)/signal.length;
  const std = Math.sqrt(variance);

  if(std === 0) return centered.map(()=>0);
  return centered.map(v => v/std);
}

function safeCorr(a,b){
  const n=a.length;
  if(n < 5) return 0;

  let sum=0;
  for(let i=0;i<n;i++)
    sum += a[i]*b[i];

  const corr = sum/n;

  if(isNaN(corr) || !isFinite(corr)) return 0;

  return Math.max(-1, Math.min(1, corr));
}

function estimateBands(signal){
  const power = signal.map(v => v*v);
  const avgPower = power.reduce((a,b)=>a+b,0)/power.length;

  return {
    delta: (avgPower*0.9).toFixed(3),
    theta: (avgPower*0.7).toFixed(3),
    alpha: (avgPower*0.5).toFixed(3),
    beta:  (avgPower*0.3).toFixed(3),
    gamma: (avgPower*0.2).toFixed(3)
  };
}

function runAnalysis(){
  const file=document.getElementById("fileInput").files[0];
  if(!file) return;

  document.getElementById("status").textContent="Analyzing...";

  const reader=new FileReader();

  reader.onload=e=>{
    try{
      const raw=parseCSV(e.target.result);

      if(raw.length < 10){
        document.getElementById("status").textContent="Dataset too small.";
        return;
      }

      const channels=raw[0].length;
      const signals=[];

      for(let c=0;c<channels;c++){
        const channel=raw.map(row=>row[c]);
        signals.push(normalize(channel));
      }

      const matrix=[];

      for(let i=0;i<channels;i++){
        matrix[i]=[];
        for(let j=0;j<channels;j++){
          matrix[i][j]=safeCorr(signals[i],signals[j]);
        }
      }

      const avg = computeMetrics(matrix);
      drawNetwork(matrix);

      const bands=estimateBands(signals[0]);
      showBands(bands);

      aiInterpret(avg,bands,channels);

      document.getElementById("status").textContent="Analysis complete";
    }
    catch(err){
      document.getElementById("status").textContent="Error processing file.";
      console.error(err);
    }
  };

  reader.readAsText(file);
}

function computeMetrics(m){
  let total=0,count=0;

  for(let i=0;i<m.length;i++)
    for(let j=i+1;j<m.length;j++){
      total += Math.abs(m[i][j]);
      count++;
    }

  if(count===0) return 0;

  const avg = total/count;

  document.getElementById("connectivity").textContent=(avg*100).toFixed(1)+"%";

  let plast,risk;
  if(avg>.7){ plast="High"; risk="Low"; }
  else if(avg>.5){ plast="Moderate"; risk="Moderate"; }
  else{ plast="Low"; risk="Elevated"; }

  document.getElementById("plasticity").textContent=plast;
  document.getElementById("risk").textContent=risk;

  return avg;
}

</script>

</body>
</html>
