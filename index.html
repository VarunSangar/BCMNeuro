<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BCMNeuro — Continuous Brain Intelligence</title>

<style>
body{
  background:#050814;
  color:#e6f0ff;
  font-family:system-ui;
  margin:0;
}

header{
  padding:20px 30px;
  font-size:22px;
  font-weight:700;
  border-bottom:1px solid #1b2a44;
}

.container{
  padding:30px;
}

.card{
  background:#0b1224;
  border:1px solid #1b2a44;
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
}

button{
  padding:10px 18px;
  font-weight:600;
  background:#3b82f6;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

button:hover{ background:#2563eb; }

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

#network{
  width:100%;
  height:420px;
  background:#020617;
  border-radius:12px;
}

.metric{ font-size:14px; margin:6px 0; }

.report{
  white-space:pre-wrap;
  line-height:1.5;
}
</style>
</head>
<body>

<header>🧠 BCMNeuro — Continuous Brain Intelligence</header>

<div class="container">

<div class="card">
<input type="file" id="fileInput">
<button onclick="analyze()">Analyze Neural Activity</button>
<div id="status"></div>
</div>

<div class="grid">

<div class="card">
<h3>Neural Metrics</h3>
<div id="metrics"></div>
</div>

<div class="card">
<h3>Frequency Profile</h3>
<div id="bands"></div>
</div>

</div>

<div class="card">
<h3>Connectivity Network</h3>
<canvas id="network"></canvas>
</div>

<div class="card">
<h3>AI Clinical Interpretation</h3>
<div id="report" class="report"></div>
</div>

</div>

<script>
// ===============================
// CONFIG
// ===============================

const BANDS={
delta:[0.5,4], theta:[4,8], alpha:[8,12],
beta:[12,30], gamma:[30,45]
};

const DEFAULT_FS=256;

// ===============================
// CSV PARSE
// ===============================

function parseCSV(text){
  const rows=text.trim().split(/\r?\n/);
  const data=[];

  for(let i=1;i<rows.length;i++){
    const nums=rows[i].split(',').map(Number);
    if(nums.every(x=>isFinite(x))) data.push(nums);
  }
  return data;
}

// ===============================
// MATH HELPERS
// ===============================

const mean=a=>a.reduce((x,y)=>x+y,0)/a.length;

function std(a){
  const m=mean(a);
  return Math.sqrt(mean(a.map(x=>(x-m)**2)))||1;
}

function detrend(a){
  const n=a.length;
  const xm=(n-1)/2, ym=mean(a);
  let num=0,den=0;

  for(let i=0;i<n;i++){
    num+=(i-xm)*(a[i]-ym);
    den+=(i-xm)*(i-xm);
  }

  const slope=num/den;
  const b=ym-slope*xm;

  return a.map((y,i)=>y-(slope*i+b));
}

function normalize(a){
  const m=mean(a), s=std(a);
  return a.map(x=>(x-m)/s);
}

// ===============================
// PSD (Welch simplified)
// ===============================

function welch(signal,fs){
  const N=signal.length;
  const seg=Math.min(N,fs*2|0);
  const step=seg/2|0;

  const psd=new Array(seg/2).fill(0);
  let count=0;

  for(let s=0;s+seg<=N;s+=step){
    const w=signal.slice(s,s+seg);

    for(let k=0;k<seg/2;k++){
      let re=0,im=0;
      for(let n=0;n<seg;n++){
        const ang=2*Math.PI*k*n/seg;
        re+=w[n]*Math.cos(ang);
        im-=w[n]*Math.sin(ang);
      }
      psd[k]+=(re*re+im*im)/seg;
    }
    count++;
  }

  for(let i=0;i<psd.length;i++) psd[i]/=count;

  const freqs=psd.map((_,i)=>i*fs/seg);
  return {freqs,psd};
}

// ===============================
// BAND POWER
// ===============================

function bandPower(sig,fs){
  const {freqs,psd}=welch(sig,fs);
  const total=psd.reduce((a,b)=>a+b,0)||1;

  const out={};

  for(const b in BANDS){
    const [lo,hi]=BANDS[b];
    let p=0;

    for(let i=0;i<freqs.length;i++)
      if(freqs[i]>=lo && freqs[i]<=hi) p+=psd[i];

    out[b]={abs:p, rel:100*p/total};
  }
  return out;
}

// ===============================
// CONNECTIVITY
// ===============================

function corr(a,b){
  const ma=mean(a), mb=mean(b);
  let num=0,da=0,db=0;

  for(let i=0;i<a.length;i++){
    const x=a[i]-ma, y=b[i]-mb;
    num+=x*y; da+=x*x; db+=y*y;
  }
  return num/Math.sqrt(da*db||1);
}

function connectivity(data){
  const ch=data[0].length;
  const mat=Array.from({length:ch},()=>Array(ch).fill(0));

  for(let i=0;i<ch;i++){
    const a=data.map(r=>r[i]);
    for(let j=i+1;j<ch;j++){
      const b=data.map(r=>r[j]);
      mat[i][j]=mat[j][i]=corr(a,b);
    }
  }
  return mat;
}

// ===============================
// VISUALIZATION
// ===============================

function drawNetwork(mat){
  const c=document.getElementById("network");
  const ctx=c.getContext("2d");
  c.width=c.offsetWidth;
  c.height=c.offsetHeight;

  const n=mat.length;
  const nodes=[];

  for(let i=0;i<n;i++){
    nodes.push({
      x:c.width/2+200*Math.cos(2*Math.PI*i/n),
      y:c.height/2+200*Math.sin(2*Math.PI*i/n)
    });
  }

  ctx.clearRect(0,0,c.width,c.height);

  ctx.strokeStyle="#3b82f6";

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const w=Math.abs(mat[i][j]);
      if(w>0.3){
        ctx.globalAlpha=w;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.stroke();
      }
    }
  }

  ctx.globalAlpha=1;
  nodes.forEach((p,i)=>{
    ctx.fillStyle="#60a5fa";
    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,2*Math.PI);
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText("Ch"+(i+1),p.x+12,p.y+4);
  });
}

// ===============================
// AI INTERPRETATION
// ===============================

function interpret(bands,conn){

  let dom="alpha";
  let max=0;

  for(const b in bands)
    if(bands[b].abs>max){ max=bands[b].abs; dom=b; }

  const g=conn.flat().reduce((a,b)=>a+Math.abs(b),0)/(conn.length**2);

  let text="AI Summary:\n";

  text+=`Dominant rhythm: ${dom.toUpperCase()}\n`;
  text+=`Global connectivity: ${g.toFixed(2)}\n\n`;

  if(dom==="alpha")
    text+="Profile consistent with relaxed wakefulness.";
  else if(dom==="beta")
    text+="Elevated fast activity suggests alert engagement.";
  else if(dom==="theta")
    text+="Theta dominance may indicate fatigue or cognitive load.";
  else if(dom==="delta")
    text+="High slow-wave activity; possible drowsiness.";
  else
    text+="Mixed spectral profile.";

  return text;
}

// ===============================
// MAIN
// ===============================

async function analyze(){

  const file=fileInput.files[0];
  if(!file) return;

  status.textContent="Processing…";

  const raw=parseCSV(await file.text());

  if(!raw.length){
    status.textContent="Invalid data.";
    return;
  }

  const fs=DEFAULT_FS;

  const samples=raw.length;
  const ch=raw[0].length;

  const proc=[];

  for(let i=0;i<samples;i++) proc[i]=[];

  for(let c=0;c<ch;c++){
    let s=raw.map(r=>r[c]);
    s=detrend(s);
    s=normalize(s);

    for(let i=0;i<samples;i++)
      proc[i][c]=s[i];
  }

  const bands=bandPower(proc.map(r=>r[0]),fs);
  const conn=connectivity(proc);

  // metrics
  const globalConn=conn.flat().reduce((a,b)=>a+Math.abs(b),0)/(ch*ch);

  metrics.innerHTML=`
<div class="metric">Channels: ${ch}</div>
<div class="metric">Samples: ${samples}</div>
<div class="metric">Connectivity: ${globalConn.toFixed(2)}</div>
`;

  bandsDiv="";
  for(const b in bands)
    bandsDiv+=`<div class="metric">${b}: ${bands[b].rel.toFixed(1)}%</div>`;
  document.getElementById("bands").innerHTML=bandsDiv;

  drawNetwork(conn);

  report.textContent=interpret(bands,conn);

  status.textContent="Analysis complete";
}
</script>

</body>
</html>
