<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BCMNeuro — Production EEG Engine</title>
<style>
body { background:#0b1220; color:white; font-family:system-ui; padding:30px; }
button { padding:10px 15px; margin-top:10px; }
pre { background:#111827; padding:15px; border-radius:8px; overflow:auto; }
</style>
</head>
<body>

<h1>BCMNeuro — Real EEG Processing</h1>

<input type="file" id="fileInput">
<br>
<button onclick="analyze()">Analyze EEG</button>

<pre id="out">Waiting...</pre>

<script>
// ===============================
// CONSTANTS
// ===============================

const BANDS = {
  delta:[0.5,4],
  theta:[4,8],
  alpha:[8,12],
  beta:[12,30],
  gamma:[30,45]
};

const MIN_DURATION = 5;
const MIN_CHANNELS = 2;

// ===============================
// CSV LOADER
// ===============================

function parseCSV(text){
  const rows = text.trim().split(/\r?\n/);
  const data = [];

  for(let i=1;i<rows.length;i++){
    const nums = rows[i].split(',').map(Number);
    if(nums.some(x => !isFinite(x))) continue;
    data.push(nums);
  }

  return data;
}

// ===============================
// VALIDATION
// ===============================

function validate(data, fs){
  if(!data.length) return "Empty dataset";

  const samples = data.length;
  const channels = data[0].length;

  if(channels < MIN_CHANNELS)
    return "Need at least 2 channels";

  if(samples/fs < MIN_DURATION)
    return "Recording too short";

  return null;
}

// ===============================
// BASIC SIGNAL HELPERS
// ===============================

function mean(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function std(arr){
  const m = mean(arr);
  return Math.sqrt(mean(arr.map(x => (x-m)*(x-m))));
}

function detrend(arr){
  const n = arr.length;
  const xMean = (n-1)/2;
  const yMean = mean(arr);

  let num=0, den=0;
  for(let i=0;i<n;i++){
    num += (i-xMean)*(arr[i]-yMean);
    den += (i-xMean)*(i-xMean);
  }

  const slope = num/den;
  const intercept = yMean - slope*xMean;

  return arr.map((y,i)=> y - (slope*i + intercept));
}

function normalize(arr){
  const m = mean(arr);
  const s = std(arr) || 1;
  return arr.map(x => (x-m)/s);
}

// ===============================
// WELCH PSD
// ===============================

function welchPSD(signal, fs){
  const N = signal.length;
  const seg = Math.min(N, fs*4|0);
  const step = seg/2|0;

  const psd = new Array(seg/2).fill(0);
  let count = 0;

  for(let start=0; start+seg<=N; start+=step){
    const window = signal.slice(start,start+seg);

    for(let k=0;k<seg/2;k++){
      let re=0, im=0;
      for(let n=0;n<seg;n++){
        const angle = 2*Math.PI*k*n/seg;
        re += window[n]*Math.cos(angle);
        im -= window[n]*Math.sin(angle);
      }
      const power = (re*re + im*im)/seg;
      psd[k] += power;
    }

    count++;
  }

  for(let i=0;i<psd.length;i++) psd[i] /= count;

  const freqs = psd.map((_,i)=> i*fs/seg);

  return {freqs, psd};
}

// ===============================
// BAND POWER
// ===============================

function bandPowers(signal, fs){
  const {freqs, psd} = welchPSD(signal, fs);
  const result = {};

  const total = psd.reduce((a,b)=>a+b,0) || 1;

  for(const band in BANDS){
    const [lo,hi] = BANDS[band];
    let power = 0;

    for(let i=0;i<freqs.length;i++){
      if(freqs[i]>=lo && freqs[i]<=hi)
        power += psd[i];
    }

    result[band] = {
      absolute: power,
      relative: 100*power/total
    };
  }

  return result;
}

// ===============================
// CONNECTIVITY (PEARSON)
// ===============================

function pearson(a,b){
  const ma = mean(a);
  const mb = mean(b);

  let num=0, da=0, db=0;

  for(let i=0;i<a.length;i++){
    const x=a[i]-ma, y=b[i]-mb;
    num += x*y;
    da += x*x;
    db += y*y;
  }

  return num/Math.sqrt(da*db || 1);
}

function connectivityMatrix(data){
  const ch = data[0].length;
  const mat = Array.from({length:ch},()=>Array(ch).fill(0));

  for(let i=0;i<ch;i++){
    const a = data.map(r=>r[i]);

    for(let j=i+1;j<ch;j++){
      const b = data.map(r=>r[j]);
      const r = pearson(a,b);
      mat[i][j]=mat[j][i]=r;
    }
  }

  return mat;
}

// ===============================
// METRICS
// ===============================

function globalConnectivity(mat){
  let sum=0,count=0;

  for(let i=0;i<mat.length;i++){
    for(let j=i+1;j<mat.length;j++){
      sum += Math.abs(mat[i][j]);
      count++;
    }
  }

  return count ? sum/count : 0;
}

// ===============================
// MAIN ANALYSIS
// ===============================

async function analyze(){

  const file = document.getElementById("fileInput").files[0];
  if(!file) return;

  const text = await file.text();
  const raw = parseCSV(text);

  const fs = 256;

  const err = validate(raw, fs);
  if(err){
    out.textContent = err;
    return;
  }

  // preprocess per channel
  const samples = raw.length;
  const ch = raw[0].length;

  const proc = [];

  for(let i=0;i<samples;i++) proc[i]=[];

  for(let c=0;c<ch;c++){
    let signal = raw.map(r=>r[c]);

    signal = detrend(signal);
    signal = normalize(signal);

    for(let i=0;i<samples;i++)
      proc[i][c] = signal[i];
  }

  const bands = bandPowers(proc.map(r=>r[0]), fs);
  const conn = connectivityMatrix(proc);

  const result = {
    status:"ok",
    global_connectivity: globalConnectivity(conn),
    dominant_band: Object.entries(bands)
      .sort((a,b)=>b[1].absolute-a[1].absolute)[0][0],
    band_powers: bands
  };

  out.textContent = JSON.stringify(result,null,2);
}
</script>

</body>
</html>
